<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шашки — партия</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
    <div class="game-layout">

        <!-- Левая панель: инфо + чат -->
        <aside class="sidebar">
            <div class="player-card" id="card-opponent">
                <div class="player-dot" id="dot-opponent"></div>
                <span id="label-opponent">Противник</span>
                <div class="piece-count" id="count-opponent">
                    <span class="piece-mini"></span><span id="num-opponent">12</span>
                </div>
            </div>

            <!-- Счёт -->
            <div class="score-panel">
                <div class="score-side" id="score-opponent-side">
                    <div class="captured-pieces" id="captured-by-me"></div>
                    <span class="score-label">съедено вами</span>
                </div>
                <div class="score-divider">vs</div>
                <div class="score-side" id="score-my-side">
                    <div class="captured-pieces" id="captured-by-opponent"></div>
                    <span class="score-label">съедено противником</span>
                </div>
            </div>

            <div class="status-box" id="status-box">
                <span id="status-text">Поиск противника…</span>
                <span class="move-timer" id="move-timer"></span>
            </div>

            <div class="chat-box">
                <div class="chat-messages" id="chat-messages"></div>
                <form class="chat-form" id="chat-form">
                    <input type="text" id="chat-input" placeholder="Сообщение…" maxlength="300" autocomplete="off">
                    <button type="submit">→</button>
                </form>
            </div>

            <div class="player-card self" id="card-self">
                <div class="player-dot self-dot"></div>
                <span id="label-self">Вы</span>
                <div class="piece-count" id="count-self">
                    <span class="piece-mini self-mini"></span><span id="num-self">12</span>
                </div>
            </div>
        </aside>

        <!-- Доска -->
        <main class="board-wrap">
            <div class="board" id="board"></div>
        </main>

    </div>

    <div class="overlay hidden" id="overlay">
        <div class="overlay-box">
            <div class="overlay-icon" id="overlay-icon"></div>
            <p id="overlay-text"></p>
            <button onclick="window.location.href='/'">На главную</button>
            <button onclick="window.location.reload()">Новая игра</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/game.js?v=3"></script>
</body>
</html>
